version: "3.3"

services:
  backup:
    image: mazzolino/restic
    container_name: restic
    hostname: nana
    environment:
      RUN_ON_STARTUP: "true"
      BACKUP_CRON: "0 */12 * * *" # Every 12 hours
      RESTIC_REPOSITORY: /restic
      RESTIC_PASSWORD: Afiaanimah*123
      RESTIC_BACKUP_SOURCES: /mnt/docker-volumes /home/nana/docker
      RESTIC_COMPRESSION: auto 
      RESTIC_BACKUP_ARGS: >-
        --tag docker-volumes
        --exclude some-folder/cache
        --exclude another-folder/with\ space
        --exclude *.tmp
        --verbose
      RESTIC_FORGET_ARGS: >-
        --keep-last 10
        --keep-daily 7
        --keep-weekly 5
        --keep-monthly 12
      TZ: Europe/London
    volumes:
      - /home/nana/docker/nas/backup:/restic
      - /home/nana/docker/nas/tmp-for-restore:/tmp-for-restore
      - /var/lib/docker/volumes:/mnt/docker-volumes:ro
      - /home/nana/docker:/home/nana/docker:ro
    security_opt:
      - no-new-privileges:true

  prune:
    image: mazzolino/restic
    container_name: restic-prune
    hostname: nana
    environment:
      RUN_ON_STARTUP: "true"
      PRUNE_CRON: "0 0 4 * * *"
      RESTIC_REPOSITORY: /restic
      RESTIC_PASSWORD: Afiaanimah*123
      TZ: Europe/London
    volumes:
      # FIX: Must mount the repository volume so prune can find your data
      - /home/nana/docker/nas/backup:/restic
    security_opt:
      - no-new-privileges:true

  check:
    image: mazzolino/restic
    container_name: restic-check
    hostname: nana
    environment:
      RUN_ON_STARTUP: "false"
      CHECK_CRON: "0 15 5 * * *"
      RESTIC_CHECK_ARGS: >-
        --read-data-subset=10%
      RESTIC_REPOSITORY: /restic
      RESTIC_PASSWORD: Afiaanimah*123
      TZ: Europe/London
    volumes:
      # FIX: Must mount the repository volume so check can audit your data
      - /home/nana/docker/nas/backup:/restic
    security_opt:
      - no-new-privileges:true