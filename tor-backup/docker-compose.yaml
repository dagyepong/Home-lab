services:
  backup:
    image: offen/docker-volume-backup:v2.47.1
    container_name: backup
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/nana/docker/authelia:/backup/authelia:ro
      - /home/nana/docker/traefik:/backup/traefik:ro
      - traefik_tor_data:/backup/tor_data:ro      # <-- changed to actual volume name
      - /home/nana/docker/backups:/archive
    env_file:
      - ./backup.env
    labels:
      - docker-volume-backup.stop-during-backup.container=authelia
      - docker-volume-backup.stop-during-backup.container=tor

volumes:
  traefik_tor_data:
    external: true
    name: traefik_tor_data   # explicitly reference the existing volume