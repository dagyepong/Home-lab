name: immich

networks:
  traefik:
    external: true

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    network_mode: host
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    environment:
      - DB_HOSTNAME=localhost
      - REDIS_HOSTNAME=localhost
    depends_on:
      - redis
      - database
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.immich-http.entrypoints=http"
      - "traefik.http.routers.immich-http.middlewares=redir-https@file"
      - "traefik.http.routers.immich-http.rule=Host(`immich.linuxpad.blog`)"
      - "traefik.http.routers.immich-http.service=noop@internal"
      - "traefik.http.routers.immich-https.entrypoints=https"
      - "traefik.http.routers.immich-https.tls=true"
      - "traefik.http.routers.immich-https.tls.certresolver=le"
      - "traefik.http.routers.immich-https.rule=Host(`immich.linuxpad.blog`)"
      - "traefik.http.routers.immich-https.middlewares=gzip@file"
      - "traefik.http.routers.immich-https.service=immich-backend"
      - "traefik.http.services.immich-backend.loadbalancer.server.port=2283"

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always
    networks:
      - traefik

  redis:
    container_name: immich_redis
    image: docker.io/redis:6.2-alpine@sha256:2ba50e1ac3a0ea17b736ce9db2b0a9f6f8b85d4c27d5f5accc6a416d8f42c6d5
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always
    networks:
      - traefik

  database:
    container_name: immich_postgres
    image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0@sha256:90724186f0a3517cf6914295b5ab410db9ce23190a2d9d0b9dd6463e3fa298f0
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    restart: always
    networks:
      - traefik

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:latest
    container_name: pocket_id
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./pocket-id-data:/app/backend/data
    ports:
      - "8083:80"                     # optional direct access
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.pocketid-http.entrypoints=http"
      - "traefik.http.routers.pocketid-http.middlewares=redir-https@file"
      - "traefik.http.routers.pocketid-http.rule=Host(`pocketid.linuxpad.blog`)"
      - "traefik.http.routers.pocketid-http.service=noop@internal"
      - "traefik.http.routers.pocketid-https.entrypoints=https"
      - "traefik.http.routers.pocketid-https.tls=true"
      - "traefik.http.routers.pocketid-https.tls.certresolver=le"
      - "traefik.http.routers.pocketid-https.rule=Host(`pocketid.linuxpad.blog`)"
      - "traefik.http.routers.pocketid-https.middlewares=gzip@file"
      - "traefik.http.routers.pocketid-https.service=pocketid-backend"
      # CRITICAL: use container's internal port (80), NOT the host port
      - "traefik.http.services.pocketid-backend.loadbalancer.server.port=80"

volumes:
  model-cache: