# https://github.com/Bruceforce/vaultwarden-backup
---
services:
  vaultwarden:
    container_name: vaultwarden
    hostname: vaultwarden
    image: vaultwarden/server:latest-alpine
    dns:
      - 1.1.1.1
    environment:
      - LOG_FILE=/data/logs/access.log
      - WEBSOCKET_ENABLED=true
      - SIGNUPS_ALLOWED=true
      - ADMIN_TOKEN=#sPqDJ!WxJAkA
      - I_REALLY_WANT_VOLATILE_STORAGE=true
      - ROCKET_ENV=prod
      - ROCKET_WORKERS=10
      - TZ=America/Chicago
      - LOG_LEVEL=error
      - EXTENDED_LOGGING=true
    ports:
      - 4044:80
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.vault-http.entrypoints=http"
      - "traefik.http.routers.vault-http.middlewares=redir-https@file"
      - "traefik.http.routers.vault-http.rule=Host(`vault.linuxpad.blog`)"
      - "traefik.http.routers.vault-http.service=noop@internal"
      - "traefik.http.routers.vault-https.entrypoints=https"
      - "traefik.http.routers.vault-https.tls=true"
      - "traefik.http.routers.vault-https.tls.certresolver=le"
      - "traefik.http.routers.vault-https.rule=Host(`vault.linuxpad.blog`)"
      - "traefik.http.routers.vault-https.middlewares=gzip@file,authelia@docker"
      - "traefik.http.routers.vault-https.service=vault-backend"
      - "traefik.http.services.vault-backend.loadbalancer.server.port=4044"

    volumes:
      - /opt/vaultwarden/data:/data
      - /opt/vaultwarden/logs:/data/logs
    restart: unless-stopped

  vaultwarden-backup:
    container_name: vaultwarden-backup
    hostname: vaultwarden-backup
    image: bruceforce/vaultwarden-backup:latest
    init: true

    volumes:
      - /opt/vaultwarden/data:/data/
      - /opt/vaultwarden/backup:/vaultwarden-backup
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - TIMESTAMP=true
      - DELETE_AFTER=30
      - UID=0
      - GID=0
      - TZ=America/Chicago
      - BACKUP_DIR=/vaultwarden-backup
      - CRON_TIME=50 3 * * *
    restart: unless-stopped
    depends_on:
      - vaultwarden

networks:
    traefik:
        external: true