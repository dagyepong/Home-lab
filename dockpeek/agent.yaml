services:
  socket-proxy:
    image: lscr.io/linuxserver/socket-proxy:latest
    container_name: docker-socket-proxy

    ports:
      - "2375:2375"

    environment:
      - CONTAINERS=1
      - IMAGES=1
      - INFO=1
      - VERSION=1
      - PING=1
      - POST=1
      - NETWORKS=1
      - ALLOW_START=1
      - ALLOW_STOP=1
      - ALLOW_RESTARTS=1

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    read_only: true
    tmpfs:
      - /run

    restart: unless-stopped